apiVersion: v1
kind: ConfigMap
metadata:
  name: pds-config
  namespace: videoprocess
data:
  PDS_HTTP_ADDR: ":8080"
  PDS_GRPC_ADDR: ":9090"
  PDS_FEATURE_PROVIDER_URL: "http://vp-feature-aggregator:8080"
  PDS_KAFKA_ENABLED: "true"
  PDS_KAFKA_BROKERS: "redpanda:9092"
  PDS_KAFKA_DECISION_TOPIC: "pds.decisions.v1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pds
  namespace: videoprocess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pds
  template:
    metadata:
      labels:
        app: pds
    spec:
      containers:
        - name: pds
          image: policy-decision-service:local
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          envFrom:
            - configMapRef:
                name: pds-config
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: pds
  namespace: videoprocess
spec:
  selector:
    app: pds
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
